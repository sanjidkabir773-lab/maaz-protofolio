 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanjid-Racing - Endless Car Racing Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 2px solid #fff;
            background: linear-gradient(to bottom, #87CEEB 0%, #98FB98 100%);
            cursor: pointer;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            z-index: 10;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 20;
        }
        #gameOver h2 {
            font-size: 36px;
            margin: 0 0 20px;
        }
        #gameOver button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 16px;
            text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>Score: <span id="score">0</span></div>
        <div>Speed: <span id="speed">0</span></div>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="instructions">
        Use ← → Arrow Keys or A/D to steer | SPACE to boost | R to restart
    </div>
    <div id="gameOver">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>High Score: <span id="highScore">0</span></p>
        <button onclick="restartGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const speedEl = document.getElementById('speed');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const highScoreEl = document.getElementById('highScore');

        // Game state
        let gameRunning = true;
        let score = 0;
        let highScore = localStorage.getItem('sanjidRacingHighScore') || 0;
        let speed = 2;
        let frame = 0;

        // Player car
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 150,
            width: 50,
            height: 100,
            lane: 0, // -1 left, 0 center, 1 right
            speed: 0
        };

        const lanes = [-150, -50, 50]; // Lane positions relative to center

        // Traffic cars
        let traffic = [];

        // Road segments for pseudo-3D
        const roadWidth = 800;
        const segmentLength = 200; // Height of each segment
        let roadSegments = [];
        for (let i = 0; i < 300; i++) {
            roadSegments.push({
                curve: 0,
                y: 0,
                color: i % 2 ? '#333' : '#555'
            });
        }

        // Keys
        const keys = {};

        // Event listeners
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ') keys[' '] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
            if (e.key === ' ') keys[' '] = false;
        });

        canvas.addEventListener('touchstart', handleTouch);
        canvas.addEventListener('touchmove', handleTouch);

        function handleTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            if (x < canvas.width / 3) {
                player.lane = -1;
            } else if (x > 2 * canvas.width / 3) {
                player.lane = 1;
            } else {
                player.lane = 0;
            }
        }

        function updatePlayer() {
            if (keys['a'] || keys['arrowleft']) {
                player.lane = Math.max(-1, player.lane - 0.2);
            }
            if (keys['d'] || keys['arrowright']) {
                player.lane = Math.min(1, player.lane + 0.2);
            }
            if (keys[' '] && player.speed < 5) {
                player.speed += 0.1; // Boost
            }
            player.x = canvas.width / 2 + lanes[Math.round((player.lane + 1))]; // Snap to lane
            speed = 2 + player.speed * 2;
        }

        function spawnTraffic() {
            if (Math.random() < 0.02 + speed / 1000) {
                const lane = Math.floor(Math.random() * 3) - 1;
                traffic.push({
                    x: canvas.width / 2 + lanes[Math.round((lane + 1))],
                    y: -100,
                    width: 50,
                    height: 100,
                    speed: speed * 1.2 + Math.random() * 2
                });
            }
        }

        function updateTraffic() {
            traffic = traffic.filter(car => {
                car.y += car.speed;
                return car.y < canvas.height;
            });
        }

        function checkCollisions() {
            traffic.forEach(car => {
                if (player.x < car.x + car.width &&
                    player.x + player.width > car.x &&
                    player.y < car.y + car.height &&
                    player.y + player.height > car.y) {
                    gameOver();
                }
            });
        }

        function updateRoad() {
            roadSegments.forEach(segment => {
                segment.y += speed;
                if (segment.y > canvas.height) {
                    segment.y = -segmentLength;
                    segment.color = frame % 2 ? '#333' : '#555';
                }
            });
        }

        function drawRoad() {
            ctx.save();
            ctx.translate(0, 0);
            for (let i = 0; i < roadSegments.length; i++) {
                const segment = roadSegments[i];
                const bottomWidth = (canvas.width * (1 - (segment.y / canvas.height) * 0.8)) / 2;
                const topWidth = bottomWidth * 0.8;
                const topY = Math.max(0, segment.y - segmentLength);
                const bottomY = segment.y;

                // Road
                ctx.fillStyle = segment.color;
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2 - bottomWidth, bottomY);
                ctx.lineTo(canvas.width / 2 + bottomWidth, bottomY);
                ctx.lineTo(canvas.width / 2 + topWidth, topY);
                ctx.lineTo(canvas.width / 2 - topWidth, topY);
                ctx.closePath();
                ctx.fill();

                // Road lines
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 5;
                ctx.setLineDash([20, 20]);
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, bottomY);
                ctx.lineTo(canvas.width / 2, topY);
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawPlayer() {
            ctx.fillStyle = '#FF4500'; // Orange supercar
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // Wheels
            ctx.fillStyle = '#000';
            ctx.fillRect(player.x + 5, player.y + 10, 10, 20);
            ctx.fillRect(player.x + 35, player.y + 10, 10, 20);
            ctx.fillRect(player.x + 5, player.y + 70, 10, 20);
            ctx.fillRect(player.x + 35, player.y + 70, 10, 20);
        }

        function drawTraffic() {
            traffic.forEach(car => {
                ctx.fillStyle = `hsl(${Math.random()*360}, 70%, 50%)`; // Random colors
                ctx.fillRect(car.x, car.y, car.width, car.height);
                // Wheels
                ctx.fillStyle = '#000';
                ctx.fillRect(car.x + 5, car.y + 10, 8, 15);
                ctx.fillRect(car.x + 37, car.y + 10, 8, 15);
                ctx.fillRect(car.x + 5, car.y + 70, 8, 15);
                ctx.fillRect(car.x + 37, car.y + 70, 8, 15);
            });
        }

        function gameLoop() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            updatePlayer();
            spawnTraffic();
            updateTraffic();
            updateRoad();
            checkCollisions();

            drawRoad();
            drawTraffic();
            drawPlayer();

            score += speed;
            frame++;
            speed = Math.min(10, speed + 0.001);

            scoreEl.textContent = Math.floor(score);
            speedEl.textContent = Math.floor(speed);

            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            finalScoreEl.textContent = Math.floor(score);
            highScoreEl.textContent = highScore;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('sanjidRacingHighScore', highScore);
            }
            gameOverEl.style.display = 'block';
        }

        function restartGame() {
            gameRunning = true;
            score = 0;
            speed = 2;
            frame = 0;
            traffic = [];
            player.lane = 0;
            player.speed = 0;
            gameOverEl.style.display = 'none';
            gameLoop();
        }

        // Start game
        gameLoop();
    </script>
</body>
</html>

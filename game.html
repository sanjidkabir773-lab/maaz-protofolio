<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sanjid Racing - Highway Traffic Racer</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:Arial; color:#fff; touch-action:none; }
    canvas { display:block; }
    #ui { position:absolute; top:10px; left:10px; z-index:20; font-size:28px; text-shadow:2px 2px #000; pointer-events:none; }
    #money { top:50px; font-size:24px; }
    #game-over { position:absolute; inset:0; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:60px; color:#ff4444; opacity:0; transition:opacity 1s; pointer-events:none; }
    #game-over.show { opacity:1; pointer-events:auto; }
    button { margin-top:30px; padding:20px 60px; font-size:36px; background:#e74c3c; border:none; color:white; border-radius:12px; cursor:pointer; }
  </style>
</head>
<body>

<div id="ui">Score: <span id="score">0</span></div>
<div id="ui" id="money">Money: $<span id="cash">0</span></div>

<div id="game-over">
  <div>CRASHED!</div>
  <div style="font-size:40px; margin:30px 0;">Score: <span id="final">0</span> | $<span id="final-cash">0</span></div>
  <button onclick="location.reload()">Try Again</button>
</div>

<canvas id="c"></canvas>

<script>
// Sanjid Racing - Highway Traffic Style (closer to MR RACER feel)

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const cashEl = document.getElementById('cash');
const finalEl = document.getElementById('final');
const finalCashEl = document.getElementById('final-cash');
const gameOverEl = document.getElementById('game-over');

let W, H;
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
window.addEventListener('resize', resize); resize();

let score = 0;
let cash = 0;
let speed = 8;
let gameRunning = true;
let player = { lane: 2, x: 0, w: 80, h: 140, color: '#e74c3c' }; // lane 0-4
let lanes = 5;
let laneWidth;
let traffic = [];
let lastSpawn = 0;
let spawnInterval = 1200;
let roadOffset = 0;
let keys = {};

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// Touch swipe for mobile
let touchX = 0;
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); touchX = e.touches[0].clientX; });
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  let dx = e.touches[0].clientX - touchX;
  if(Math.abs(dx)>40){
    player.lane += dx>0 ? 1 : -1;
    touchX = e.touches[0].clientX;
  }
});

function updatePlayerPos(){
  laneWidth = W / lanes;
  player.x = (player.lane * laneWidth) + (laneWidth - player.w)/2;
  if(player.lane < 0) player.lane = 0;
  if(player.lane > lanes-1) player.lane = lanes-1;
}

function spawnCar(){
  let lane = Math.floor(Math.random()*lanes);
  let color = ['#c0392b','#f39c12','#27ae60','#2980b9','#8e44ad'][Math.floor(Math.random()*5)];
  traffic.push({
    lane,
    x: 0,
    y: -160 - Math.random()*200,
    w: 80,
    h: 140,
    color,
    speedOffset: Math.random()*2 -1 // slight speed variation
  });
}

function update(){
  if(!gameRunning) return;

  // Controls
  if(keys['a'] || keys['arrowleft']) player.lane--;
  if(keys['d'] || keys['arrowright']) player.lane++;
  updatePlayerPos();

  // Auto accelerate + manual boost
  if(keys['w'] || keys['arrowup']) speed = Math.min(speed + 0.2, 20);
  if(keys['s'] || keys['arrowdown']) speed = Math.max(speed - 0.3, 6);

  // Spawn traffic
  lastSpawn += 16;
  if(lastSpawn > spawnInterval){
    spawnCar();
    lastSpawn = 0;
    spawnInterval = Math.max(600, spawnInterval - 15);
  }

  // Move traffic relative to player
  for(let i=traffic.length-1; i>=0; i--){
    let c = traffic[i];
    c.y += (speed + c.speedOffset);

    // Side collision / crash
    if(c.lane === player.lane && Math.abs(c.y - (H - 200)) < 120){
      gameRunning = false;
      finalEl.textContent = score;
      finalCashEl.textContent = cash;
      gameOverEl.classList.add('show');
    }

    // Passed car = score & cash
    if(c.y > H + 100){
      traffic.splice(i,1);
      score += 10;
      cash += 50;
      scoreEl.textContent = score;
      cashEl.textContent = cash;
    }
  }

  // Road scroll
  roadOffset = (roadOffset + speed*0.6) % 100;

  // Difficulty ramp
  if(score > 300) speed = Math.min(22, speed + 0.01);
}

function drawRoad(){
  // Sky/ground
  ctx.fillStyle = '#0a1f3a';
  ctx.fillRect(0,0,W,H);

  // Road
  ctx.fillStyle = '#222';
  ctx.fillRect(0, H*0.1, W, H*0.8);

  // Lane lines
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 8;
  ctx.setLineDash([40, 30]);
  for(let i=1; i<lanes; i++){
    let x = i * laneWidth;
    ctx.beginPath();
    ctx.moveTo(x, roadOffset - 100);
    ctx.lineTo(x, H + 100);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Side barriers
  ctx.fillStyle = '#444';
  ctx.fillRect(0, H*0.1, W, 20);
  ctx.fillRect(0, H*0.9 -20, W, 20);
}

function drawCar(x,y,w,h,col,isPlayer=false){
  ctx.fillStyle = col;
  ctx.fillRect(x,y,w,h);
  // Roof/window
  ctx.fillStyle = isPlayer ? '#bdc3c7' : '#2c3e50';
  ctx.fillRect(x+10, y+30, w-20, h-70);
  // Wheels
  ctx.fillStyle = '#111';
  ctx.fillRect(x-6, y+20, 12, h-40);
  ctx.fillRect(x+w-6, y+20, 12, h-40);
  // Headlights
  ctx.fillStyle = '#ff0';
  ctx.fillRect(x+10, y+h-20, 20, 15);
  ctx.fillRect(x+w-30, y+h-20, 20, 15);
}

function render(){
  drawRoad();

  // Player car at bottom center-ish
  drawCar(player.x, H-200, player.w, player.h, player.color, true);

  // Traffic cars
  traffic.forEach(c=>{
    let cx = (c.lane * laneWidth) + (laneWidth - c.w)/2;
    drawCar(cx, c.y, c.w, c.h, c.color);
  });
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
